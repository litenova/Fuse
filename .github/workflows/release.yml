name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on tags like v1.0.0, v2.3.1

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  release:
    name: Build & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"         # e.g. v1.2.3
          $version = $tag.TrimStart('v')           # e.g. 1.2.3
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained Windows x64
        shell: pwsh
        run: |
          dotnet publish src/Fuse.Cli/Fuse.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishReadyToRun=false `
            -p:DebugType=none `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output publish/win-x64

      - name: Rename output to fuse.exe
        shell: pwsh
        run: |
          $src = Get-ChildItem publish/win-x64/*.exe | Select-Object -First 1
          Rename-Item $src.FullName "fuse.exe"

      - name: Bundle installer + exe into zip
        shell: pwsh
        run: |
          Copy-Item install-fuse.ps1 publish/win-x64/install-fuse.ps1
          Compress-Archive `
            -Path publish/win-x64/fuse.exe, publish/win-x64/install-fuse.ps1 `
            -DestinationPath "fuse-${{ steps.version.outputs.VERSION }}-win-x64.zip"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fuse ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: fuse-${{ steps.version.outputs.VERSION }}-win-x64.zip
